<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>{% block title %}UMS{% endblock %} | University Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar glass-effect">
      <div class="sidebar-header">
        <i class="fas fa-university logo-icon"></i>
        <h2>UMS</h2>
      </div>
      <nav class='navbar'>
        <a href='/' class="{{ 'active' if request.endpoint == 'index' else '' }}"><i class="fas fa-home"></i> Dashboard</a>
        <a href='/students' class="{{ 'active' if request.endpoint == 'students' else '' }}"><i class="fas fa-user-graduate"></i> Students</a>
        <a href='/faculty' class="{{ 'active' if request.endpoint == 'faculty' else '' }}"><i class="fas fa-chalkboard-teacher"></i> Faculty</a>
        <a href='/courses' class="{{ 'active' if request.endpoint == 'courses' else '' }}"><i class="fas fa-book"></i> Courses</a>
      </nav>
      <div class="sidebar-footer">
        <p>&copy; 2026 University Management</p>
      </div>
    </aside>
    
    <main class='main-content'>
      <header class="top-header glass-effect">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Search anything...">
        </div>
        <div class="user-profile">
          <div class="avatar">Admin</div>
        </div>
      </header>

      <div class="content-wrapper">
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-messages">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }}">
                  {{ message }}
                  <span class="close-btn" onclick="this.parentElement.style.display='none';">&times;</span>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
      </div>
    </main>
  </div>
</body>
</html>
