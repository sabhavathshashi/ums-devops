<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8'>
  <meta name='viewport' content='width=device-width, initial-scale=1.0'>
  <title>Login | University Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
  <link rel='stylesheet' href='{{ url_for("static", filename="css/style.css") }}'>
  <style>
    .login-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      width: 100%;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }
    .login-logo {
      font-size: 48px;
      color: var(--accent-primary);
      margin-bottom: 16px;
    }
    .login-card h2 {
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 14px;
    }
    .login-form .form-group {
      text-align: left;
    }
    .login-btn {
      width: 100%;
      justify-content: center;
      padding: 14px;
      font-size: 16px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-card glass-effect">
      <i class="fas fa-university login-logo"></i>
      <h2>Welcome Back</h2>
      <p>Sign in to the University Management System</p>
      
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages" style="margin-bottom: 20px;">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" style="text-align: left; padding: 12px; margin-bottom: 8px;">
                {{ message }}
              </div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <form class="login-form" method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required placeholder="admin" autofocus>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="admin123">
        </div>
        <button type="submit" class="btn btn-primary login-btn">Sign In</button>
      </form>
    </div>
  </div>
</body>
</html>
