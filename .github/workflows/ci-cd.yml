name: UMS CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: ums-flask

jobs:
  # ── JOB 1: LINT ────────────────────────────────────
  lint:
    name: Code Quality — flake8
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install lint dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 . --max-line-length=120 --exclude=venv,__pycache__

  # ── JOB 2: TEST ────────────────────────────────────
  test:
    name: Unit Tests — pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: PYTHONPATH=. pytest --tb=short

  # ── JOB 3: BUILD DOCKER IMAGE ──────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

  # ── JOB 4: DEPLOY ──────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Notify deployment
        run: echo "Deployed $IMAGE_NAME:latest successfully."